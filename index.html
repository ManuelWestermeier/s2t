<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Whisper Live DE</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #out { white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; min-height: 200px; }
    button { padding: 10px; margin-right: 10px; }
  </style>
</head>
<body>

<h3>Whisper (lokal im Browser)</h3>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="out"></div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let recorder;
let chunks = [];
let transcriber;

async function init() {
  transcriber = await pipeline(
    "automatic-speech-recognition",
    "Xenova/whisper-tiny"
  );
}

await init();

async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: "audio/webm" });
    chunks = [];

    const arrayBuffer = await blob.arrayBuffer();

    const result = await transcriber(arrayBuffer, {
      language: "german",
      task: "transcribe"
    });

    document.getElementById("out").textContent += result.text + "\n";

    if (recorder) recorder.start();
  };

  recorder.start();
  setTimeout(() => recorder.stop(), 4000);
}

function stop() {
  if (recorder) recorder.stop();
  recorder = null;
}
</script>

</body>
</html>
