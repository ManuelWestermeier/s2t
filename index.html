<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Whisper STT Lokal (DE)</title>
<style>
  body { font-family: Arial; padding: 20px; }
  button { padding: 10px 20px; margin-right: 10px; }
  #output { margin-top: 20px; font-size: 18px; white-space: pre-wrap; }
</style>
</head>
<body>

<h2>Lokales Speech-to-Text (Whisper WASM)</h2>

<button id="start">Start Aufnahme</button>
<button id="stop">Stop + Transkribieren</button>

<div id="status">Lade Modell...</div>
<div id="output"></div>

<script type="module">
import init, { Whisper } from "https://cdn.jsdelivr.net/npm/whisper.cpp@latest/dist/whisper.js";

let whisper;
let mediaRecorder;
let audioChunks = [];

const status = document.getElementById("status");
const output = document.getElementById("output");

async function loadModel() {
  await init();
  whisper = new Whisper();

  // Modell laden (lokale Datei!)
  await whisper.loadModel("ggml-base.bin");

  status.innerText = "Modell geladen";
}

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);

  audioChunks = [];

  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };

  mediaRecorder.start();
  status.innerText = "Aufnahme läuft...";
}

async function stopRecording() {
  return new Promise(resolve => {
    mediaRecorder.onstop = resolve;
    mediaRecorder.stop();
  });
}

async function transcribe() {
  const blob = new Blob(audioChunks, { type: "audio/webm" });
  const arrayBuffer = await blob.arrayBuffer();

  status.innerText = "Transkribiere...";

  const result = await whisper.transcribe(arrayBuffer, {
    language: "de",
    prompt: "Namen: Manuel Westermeier, Sebastian, München, Traunstein"
  });

  output.innerText = result.text;
  status.innerText = "Fertig";
}

document.getElementById("start").onclick = startRecording;

document.getElementById("stop").onclick = async () => {
  await stopRecording();
  await transcribe();
};

loadModel();
</script>

</body>
</html>
