<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Speech to Text (DE)</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #out { white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; min-height: 200px; }
    button { margin-right: 10px; padding: 10px; }
  </style>
</head>
<body>

<h3>Live Speech-to-Text (Deutsch)</h3>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="out"></div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  document.getElementById("out").textContent =
    "Browser unterstützt keine SpeechRecognition API.";
}

let rec;
let finalText = "";

function start() {
  rec = new SpeechRecognition();
  rec.lang = "de-DE";
  rec.continuous = true;
  rec.interimResults = true;

  rec.onresult = (event) => {
    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const txt = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += txt + "\n";
      } else {
        interim += txt;
      }
    }

    document.getElementById("out").textContent = finalText + interim;
  };

  rec.onerror = (e) => {
    console.log("Error:", e);
  };

  rec.start();
}

function stop() {
  if (rec) rec.stop();
}
</script>

</body>
</html>
