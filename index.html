<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Live STT DE</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #out { white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; min-height: 200px; }
    button { padding: 10px; margin-right: 10px; }
  </style>
</head>
<body>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<div id="out"></div>

<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
  document.getElementById("out").textContent = "SpeechRecognition nicht verfügbar (nur Chrome/Edge).";
}

let rec;
let finalText = "";

function start() {
  rec = new SR();
  rec.lang = "de-DE";
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onresult = (e) => {
    let interim = "";

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;

      if (e.results[i].isFinal) {
        finalText += t.trim() + "\n";
      } else {
        interim += t;
      }
    }

    document.getElementById("out").textContent = finalText + interim;
  };

  rec.onerror = (e) => {
    console.log("error", e);
  };

  rec.onend = () => {
    // Auto-restart für "live" Verhalten
    if (rec) rec.start();
  };

  rec.start();
}

function stop() {
  if (rec) {
    rec.onend = null;
    rec.stop();
    rec = null;
  }
}
</script>

</body>
</html>
